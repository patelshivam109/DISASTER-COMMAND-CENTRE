services:
  - type: web
    name: disaster-command-centre-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: python -m flask db upgrade && gunicorn app:app
    healthCheckPath: /api/test
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: CORS_ORIGINS
        value: "*"
      - key: LOG_LEVEL
        value: INFO
